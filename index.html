<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aline Locações - Catálogo</title>
    <style>
        :root {
            --marrom-escuro: #4a332d;
            --marrom-claro: #8d6e63;
            --bege-fundo: #fdfaf5;
            --dourado: #c5a059;
            --branco: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bege-fundo);
            margin: 0; padding: 0; color: #333;
        }

        header {
            background: var(--branco);
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid var(--marrom-escuro);
        }

        .logo-box {
            width: 90px; height: 90px;
            margin: 0 auto 10px;
            border-radius: 50%;
            border: 2px solid var(--dourado);
            display: flex; align-items: center; justify-content: center;
            background: #fff;
            overflow: hidden;
        }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }

        header h1 { margin: 0; color: var(--marrom-escuro); text-transform: uppercase; font-size: 20px; letter-spacing: 1px; }

        .container { padding: 15px; max-width: 600px; margin: auto; padding-bottom: 120px; }

        .dados-cliente {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .dados-cliente label {
            display: block;
            font-size: 11px;
            font-weight: bold;
            color: var(--marrom-escuro);
            margin-bottom: 3px;
            text-transform: uppercase;
        }

        .dados-cliente input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .categoria-titulo {
            background: var(--marrom-escuro);
            color: var(--branco);
            padding: 10px; margin-top: 25px;
            border-radius: 5px; text-transform: uppercase; font-size: 13px; text-align: center;
        }

        table { width: 100%; border-collapse: collapse; background: var(--branco); margin-bottom: 5px; }

        td { padding: 12px 5px; border-bottom: 1px solid #f2f2f2; vertical-align: middle; }

        .foto-produto {
            width: 70px; height: 70px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #eee;
            display: block;
            background: #fafafa;
            cursor: zoom-in;
        }

        .item-nome { display: block; font-weight: bold; color: var(--marrom-escuro); text-transform: uppercase; font-size: 12px; }
        .item-preco { color: var(--marrom-claro); font-size: 11px; font-weight: bold; }
        .obs-cor { color: #d32f2f; font-size: 10px; font-style: italic; display: block; margin-top: 2px; }

        input[type="number"] { width: 45px; padding: 8px; border: 1px solid #ddd; border-radius: 5px; text-align: center; font-weight: bold; }

        .footer-acao {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--branco); padding: 15px;
            box-shadow: 0 -3px 15px rgba(0,0,0,0.1); text-align: center; box-sizing: border-box;
        }

        .btn-finalizar {
            width: 100%; max-width: 400px; padding: 16px;
            border: none; background: #25d366; color: white;
            font-size: 16px; font-weight: bold; border-radius: 35px; cursor: pointer;
        }
        /* Estilos para visualização maior da imagem ao clicar */
        .img-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }
        .img-overlay img {
            max-width: 95%;
            max-height: 95%;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.2s ease;
        }
        .img-overlay img:hover { transform: scale(1.02); cursor: zoom-out; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <img src="/IMG/logo.png" alt="Aline Locações">
    </div>
    <h1>Aline Locações</h1>
    <p style="font-size: 12px; color: #888; font-weight: bold;">(62) 98424-6841</p>
</header>

<div class="container">
    <div class="dados-cliente">
        <label>Seu Nome:</label>
        <input type="text" id="cliente_nome" placeholder="Digite seu nome completo">
        
        <label>Local de Entrega / Espaço:</label>
        <input type="text" id="evento_local" placeholder="Ex: Salão de Festas X">
        
        <label>Data do Evento:</label>
        <input type="date" id="evento_data">
    </div>

    <div id="conteudo-catalogo"></div>
</div>

<div class="footer-acao">
    <button class="btn-finalizar" onclick="enviarPedido()">🛒 FINALIZAR NO WHATSAPP</button>
</div>

<script>
const catalogo = {
    "Cadeiras": [
        {n: "Cadeira Dior", p: 7.00, img: "cadeira_dior.png"},
        {n: "Cadeira Paris", p: 8.00, img: "cadeira_paris.png"},
        {n: "Cadeira tiffany marrom", p: 6.00, img: "cadeira_tiffany_marrom.png"},
        {n: "Cadeira tiffany branca", p: 7.00, img: "cadeira_tiffany_branca.png"},
        {n: "Cadeira de plástico", p: 2.80, img: "cadeira_de_plastico.jpg"}
    ],
    "Louças e Talheres": [
        {n: "Prato de jantar", p: 0.80, img: "prato_de_jantar.png"},
        {n: "Prato de sobremesa", p: 0.80, img: "prato_de_sobremesa.png"},
        {n: "Garfo de jantar", p: 0.80, img: "garfo_de_jantar.png"},
        {n: "Faca de jantar", p: 0.80, img: "faca_de_jantar.png"},
        {n: "Garfo de sobremesa", p: 0.80, img: "garfo_de_sobremesa.png"},
        {n: "Colher de sobremesa", p: 0.80, img: "colher_de_sobremesa.png"},
        {n: "Colher de servir", p: 3.00, img: "colher_de_servir.png"},
        {n: "Pegador", p: 3.00, img: "pegador.png"},
        {n: "Taca bistrô", p: 0.90, img: "taca_bistro_agua.png"},
        {n: "taça bico de jaca transparente", p: 1.00, img: "taca_bico_de_jaca_transparente.png"},
        {n: "Taça bico de jaca", p: 1.30, img: "taca_bico_de_jaca.png"},
        {n: "Jarra", p: 5.00, img: "jarra.png"},
        {n: "Rechaud retangular", p: 30.00, img: "rechaud_retangular.jpg"},
        {n: "Rechaud redondo", p: 30.00, img: "rechaud_redondo.jpg"},
        {n: "Travessa oval", p: 13.00, img: "travessa_oval.jpg"},
        {n: "Bandeija de garçom", p: 5.00, img: "bandeija_redonda.jpg"}
    ],
    "Enxoval": [
        {n: "Guardanapos", p: 1.00, obs: "Verificar cores", img: ""},
        {n: "Sousplat de rattan", p: 2.70, img: "sousplat_rattan.png"},
        {n: "Sousplat verde Olívia", p: 2.50, img: "sousplat_verdeoliva.png"},
        {n: "Sousplat Terra cota", p: 2.50, img: "sousplat_terracota.png"},
        {n: "Toalha para mesa de 6 lugares", p: 12.00, obs: "Verificar cores", img: ""},
        {n: "Toalha para mesa de 8 lugares", p: 12.00, obs: "Verificar cores", img: ""},
        {n: "Toalha para mesa de 10 lugares", p: 15.00, obs: "Verificar cores", img: ""},
    ],
    "Mesas e Jogos": [
        {n: "Mesa 4 lug. c/ plast. e forro", p: 18.50, img: "mesa_4lugares.jpg"},
        {n: "Mesa 6 lug. c/ plast. e toalha", p: 30.00, img: "mesa_6lugares_com_cadeira_de_plastico.jpg"},
        {n: "Mesa 8 lug. c/ plast. e toalha", p: 32.00, img: "mesa_8lugares_com_cadeira_de_plastico.jpg"},
        {n: "Mesa 10 lug. c/ plast. e toalha", p: 50.00, img: "mesa_10lugares_com_cadeira_de_plastico.jpg"},
        {n: "Mesa 6 lugares (avulsa)", p: 6.00, obs:"Diâmetro 1.10", img: "mesa_6avulsa.jpg"},
        {n: "Mesa 8 lugares (avulsa)", p: 7.00, obs:"Diâmetro 1.20", img: "mesa_8avulsa.jpg"},
        {n: "Mesa 10 lugares (avulsa)", p: 13.00,obs:"Diâmetro 1.60", img: "mesa_10avulsa.jpg"}
        
    ]
};

function renderizar() {
    const container = document.getElementById('conteudo-catalogo');
    let htmlFinal = "";

    for (let cat in catalogo) {
        htmlFinal += `<div class="categoria-titulo">${cat}</div>`;
        htmlFinal += `<table>`;
            catalogo[cat].forEach(item => {
           let fotoPath = item.img ? `/IMG/${item.img}` : "https://via.placeholder.com/70?text=Item";
            htmlFinal += `
                <tr>
                    <td width="80"><img src="${fotoPath}" class="foto-produto"></td>
                    <td>
                        <span class="item-nome">${item.n}</span>
                        <span class="item-preco">R$ ${item.p.toFixed(2)}</span>
                        ${item.obs ? `<span class="obs-cor">${item.obs}</span>` : ''}
                    </td>
                    <td width="55" align="right">
                        <input type="number" min="0" value="0" data-nome="${item.n}" data-preco="${item.p}">
                    </td>
                </tr>`;
        });
        htmlFinal += `</table>`;
    }
    container.innerHTML = htmlFinal;
}

function enviarPedido() {
    const nome = document.getElementById('cliente_nome').value;
    const local = document.getElementById('evento_local').value;
    const dataRaw = document.getElementById('evento_data').value;
    let dataFormatada = dataRaw ? dataRaw.split('-').reverse().join('/') : 'Não informada';

    if (!nome) { alert("Por favor, preencha o seu nome."); return; }

    let inputs = document.querySelectorAll('input[type="number"]');
    let itensTexto = "";
    let total = 0;
    let temItens = false;

    inputs.forEach(input => {
        let qtd = parseInt(input.value);
        if (qtd > 0) {
            let nomeItem = input.getAttribute('data-nome');
            let preco = parseFloat(input.getAttribute('data-preco'));
            let subtotal = qtd * preco;
            total += subtotal;
            temItens = true;
            itensTexto += `▪️ *${nomeItem.toUpperCase()}* x ${qtd} = R$ ${subtotal.toFixed(2)}%0A`;
        }
    });

    if (!temItens) { alert("Selecione ao menos um item."); return; }

    let mensagem = `*SOLICITAÇÃO DE ORÇAMENTO - ALINE LOCAÇÕES*%0A%0A`;
    mensagem += `👤 *CLIENTE:* ${nome}%0A`;
    mensagem += `📍 *LOCAL:* ${local || 'Não informado'}%0A`;
    mensagem += `📅 *DATA:* ${dataFormatada}%0A%0A`;
    mensagem += `*ITENS ESCOLHIDOS:*%0A${itensTexto}%0A`;
    mensagem += `💰 *TOTAL ESTIMADO: R$ ${total.toFixed(2)}*`;

    window.open(`https://wa.me/5562984246841?text=${mensagem}`, "_blank");
}
    renderizar();
    setupImagePreview();

    function setupImagePreview() {
        const container = document.getElementById('conteudo-catalogo');
        container.addEventListener('click', (e) => {
            const targetImg = e.target.closest('.foto-produto');
            if (!targetImg) return;
            openImageModal(targetImg.src);
        });
    }

    function openImageModal(src) {
        const overlay = document.createElement('div');
        overlay.className = 'img-overlay';
        const img = document.createElement('img');
        img.src = src;
        img.alt = 'Visualização';
        overlay.appendChild(img);

        // fechar ao clicar no overlay
        overlay.addEventListener('click', () => {
            overlay.remove();
            document.body.style.overflow = '';
            document.removeEventListener('keydown', escHandler);
        });

        // bloquear scroll de fundo enquanto aberto
        document.body.appendChild(overlay);
        document.body.style.overflow = 'hidden';

        // fechar com ESC
        function escHandler(e) { if (e.key === 'Escape') { overlay.remove(); document.body.style.overflow = ''; document.removeEventListener('keydown', escHandler); } }
        document.addEventListener('keydown', escHandler);
    }
</script>
</body>
</html>
